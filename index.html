<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexTalk</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0C0B12; --surface: #13111E; --border: rgba(255,255,255,0.07);
    --accent: #7C6FFF; --accent2: #FF6B9D; --text: #EAE8F5; --muted: #6B6886;
    --bubble-me: linear-gradient(135deg, #5A52D5, #7C6FFF);
    --bubble-other: rgba(255,255,255,0.06);
  }
  body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }

  /* AUTH */
  #auth-screen {
    display: flex; align-items: center; justify-content: center; height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, rgba(124,111,255,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(255,107,157,0.1) 0%, transparent 60%), var(--bg);
  }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px 36px; width: 380px; box-shadow: 0 32px 80px rgba(0,0,0,0.5); }
  .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .auth-logo-icon { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .auth-logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .auth-logo p { font-size: 12px; color: var(--muted); }
  .tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  .tab-btn { flex: 1; padding: 8px; border: none; border-radius: 8px; background: none; color: var(--muted); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .tab-active { background: var(--accent) !important; color: white !important; }
  .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .form-group input { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--muted); }
  #auth-error { color: #FF6B6B; font-size: 12px; margin-bottom: 12px; min-height: 16px; }
  .auth-btn { width: 100%; padding: 13px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #5A52D5); color: white; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .auth-btn:hover { opacity: 0.9; }

  /* APP */
  #app { display: none; height: 100vh; }
  .layout { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 250px; min-width: 250px; background: #09080F; border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: all 0.3s ease; overflow: hidden; }
  .sidebar-hidden { width: 0 !important; min-width: 0 !important; }
  .sidebar-header { padding: 18px 14px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .brand-name { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; white-space: nowrap; }
  .sidebar-section { padding: 14px 8px 6px; }
  .section-label { font-size: 10px; font-weight: 700; color: #3D3A55; letter-spacing: 1.5px; text-transform: uppercase; padding: 0 6px 8px; }
  .ch-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .ch-item:hover { background: rgba(255,255,255,0.04); }
  .ch-active { background: rgba(124,111,255,0.15) !important; }
  .ch-item span { font-size: 13px; color: var(--muted); }
  .ch-active span { color: var(--text); font-weight: 600; }
  .sidebar-footer { margin-top: auto; padding: 12px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #0C0B12; flex-shrink: 0; }
  #user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #signout-btn { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; flex-shrink: 0; }
  #signout-btn:hover { color: #FF6B6B; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: 58px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; padding: 0 20px; background: rgba(9,8,15,0.7); backdrop-filter: blur(10px); flex-shrink: 0; }
  #menu-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; }
  #channel-name { font-weight: 700; font-size: 15px; }

  /* Messages */
  #messages-wrap { flex: 1; overflow-y: auto; position: relative; }
  #messages { padding: 16px 20px 8px; display: flex; flex-direction: column; }
  .loading { color: var(--muted); font-size: 13px; text-align: center; padding: 40px; }
  .msg-wrap { display: flex; align-items: flex-end; gap: 8px; }
  .msg-wrap.me { flex-direction: row-reverse; }
  .msg-col { display: flex; flex-direction: column; max-width: 65%; }
  .msg-meta { font-size: 11px; color: var(--muted); margin-bottom: 3px; padding: 0 4px; }
  .bubble { padding: 9px 14px; font-size: 14px; line-height: 1.55; word-break: break-word; }
  .bubble-me { background: var(--bubble-me); border-radius: 16px 4px 16px 16px; }
  .bubble-other { background: var(--bubble-other); border-radius: 4px 16px 16px 16px; }
  .file-bubble { display: flex; align-items: center; gap: 12px; }
  .file-name { font-size: 13px; font-weight: 600; }
  .file-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  /* Input */
  .input-bar { padding: 10px 20px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .input-wrap { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 14px; padding: 6px 6px 6px 16px; transition: border-color 0.2s; }
  .input-wrap:focus-within { border-color: rgba(124,111,255,0.4); }
  #msg-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 14px; }
  #msg-input::placeholder { color: var(--muted); }
  .icon-btn { background: rgba(255,255,255,0.05); border: none; border-radius: 10px; width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  #send-btn { background: linear-gradient(135deg, var(--accent), #5A52D5); border: none; border-radius: 10px; width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .input-hint { text-align: center; font-size: 10px; color: #2A2840; margin-top: 8px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(124,111,255,0.2); border-radius: 2px; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <div><h1>NexTalk</h1><p>Messagerie en temps réel</p></div>
    </div>
    <div class="tabs">
      <button class="tab-btn tab-active" data-tab="login">Se connecter</button>
      <button class="tab-btn" data-tab="register">Créer un compte</button>
    </div>
    <div id="name-group" class="form-group" style="display:none">
      <label>Votre prénom</label>
      <input id="auth-name" type="text" placeholder="Ex : Sophie"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input id="auth-email" type="email" placeholder="vous@email.com"/>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input id="auth-pass" type="password" placeholder="••••••••"/>
    </div>
    <p id="auth-error"></p>
    <button id="auth-submit" class="auth-btn">Se connecter</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">
    <div id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon">💬</div>
          <div class="brand-name">NexTalk</div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="section-label">Salons</div>
        <div id="channel-list"></div>
      </div>
      <div class="sidebar-footer">
        <div class="avatar" id="user-initials" style="background:#7C6FFF">?</div>
        <span id="user-name">...</span>
        <button id="signout-btn" title="Se déconnecter">🚪</button>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <button id="menu-btn">☰</button>
        <div id="channel-name"># général</div>
      </div>
      <div id="messages-wrap">
        <div id="messages"><div class="loading">Chargement…</div></div>
      </div>
      <div class="input-bar">
        <div class="input-wrap">
          <input id="msg-input" type="text" placeholder="Écrire un message…"/>
          <button id="send-btn">➤</button>
        </div>
        <div class="input-hint">Appuyez sur Entrée pour envoyer</div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://niogpehtgxqflpdluzbo.supabase.co";
const SUPABASE_KEY = "sb_publishable_PW38JOVuiXptFu1zfuDR1A_2TItovQo";
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const CHANNELS = [
  { id: "general", label: "général", icon: "💬" },
  { id: "design", label: "design", icon: "🎨" },
  { id: "dev", label: "développement", icon: "💻" },
  { id: "random", label: "aléatoire", icon: "🎲" },
];

let currentChannel = "general";
let currentUser = null;
let realtimeSub = null;

const $ = id => document.getElementById(id);

function initials(name) {
  return (name || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
}
function avatarColor(name) {
  const colors = ["#FF6B6B","#4ECDC4","#FFE66D","#6C63FF","#FF8B94","#45AAF2","#F7B731","#A8E6CF"];
  let h = 0; for (const c of (name||"")) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}
function formatTime(ts) {
  return new Date(ts).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
}
function escapeHtml(t) {
  return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Build channel list ──
function buildChannels() {
  const list = $("channel-list");
  list.innerHTML = "";
  CHANNELS.forEach(ch => {
    const el = document.createElement("div");
    el.className = "ch-item" + (ch.id === currentChannel ? " ch-active" : "");
    el.dataset.ch = ch.id;
    el.innerHTML = `<span>${ch.icon}</span><span>#${ch.label}</span>`;
    el.onclick = () => switchChannel(ch.id);
    list.appendChild(el);
  });
}

function switchChannel(id) {
  currentChannel = id;
  const ch = CHANNELS.find(c => c.id === id);
  $("channel-name").textContent = "# " + (ch?.label || id);
  buildChannels();
  loadMessages();
  subscribeRealtime();
}

// ── Load messages ──
async function loadMessages() {
  $("messages").innerHTML = `<div class="loading">Chargement…</div>`;
  const { data, error } = await sb
    .from("messages")
    .select("*")
    .eq("channel", currentChannel)
    .order("created_at", { ascending: true })
    .limit(100);
  if (error) { $("messages").innerHTML = `<div class="loading">Erreur : ${error.message}</div>`; return; }
  renderMessages(data || []);
}

function renderMessages(msgs) {
  const box = $("messages");
  box.innerHTML = "";
  let lastUid = null;
  msgs.forEach(msg => {
    const isMe = msg.user_id === currentUser?.id;
    const showMeta = msg.user_id !== lastUid;
    lastUid = msg.user_id;
    const name = msg.display_name || "Anonyme";
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap " + (isMe ? "me" : "other");
    wrap.style.marginTop = showMeta ? "14px" : "2px";
    const avatar = showMeta && !isMe
      ? `<div class="avatar" style="background:${avatarColor(name)}">${initials(name)}</div>`
      : `<div style="width:34px;flex-shrink:0"></div>`;
    const meta = showMeta ? `<div class="msg-meta">${isMe ? "" : escapeHtml(name) + " · "}${formatTime(msg.created_at)}</div>` : "";
    const bubble = `<div class="bubble ${isMe ? "bubble-me" : "bubble-other"}">${escapeHtml(msg.content)}</div>`;
    wrap.innerHTML = isMe
      ? `<div class="msg-col" style="align-items:flex-end">${meta}${bubble}</div>`
      : `${avatar}<div class="msg-col">${meta}${bubble}</div>`;
    box.appendChild(wrap);
  });
  box.parentElement.scrollTop = box.parentElement.scrollHeight;
}

// ── Realtime ──
function subscribeRealtime() {
  if (realtimeSub) sb.removeChannel(realtimeSub);
  realtimeSub = sb.channel("room-" + currentChannel)
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages", filter: `channel=eq.${currentChannel}` },
      payload => {
        appendMessage(payload.new);
      })
    .subscribe();
}

function appendMessage(msg) {
  const box = $("messages");
  const isMe = msg.user_id === currentUser?.id;
  const name = msg.display_name || "Anonyme";
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap " + (isMe ? "me" : "other");
  wrap.style.marginTop = "14px";
  const avatar = !isMe ? `<div class="avatar" style="background:${avatarColor(name)}">${initials(name)}</div>` : `<div style="width:34px;flex-shrink:0"></div>`;
  const meta = `<div class="msg-meta">${isMe ? "" : escapeHtml(name) + " · "}${formatTime(msg.created_at)}</div>`;
  const bubble = `<div class="bubble ${isMe ? "bubble-me" : "bubble-other"}">${escapeHtml(msg.content)}</div>`;
  wrap.innerHTML = isMe
    ? `<div class="msg-col" style="align-items:flex-end">${meta}${bubble}</div>`
    : `${avatar}<div class="msg-col">${meta}${bubble}</div>`;
  box.appendChild(wrap);
  box.parentElement.scrollTop = box.parentElement.scrollHeight;
}

// ── Send ──
async function sendMessage() {
  const text = $("msg-input").value.trim();
  if (!text || !currentUser) return;
  $("msg-input").value = "";
  const { error } = await sb.from("messages").insert({
    channel: currentChannel,
    content: text,
    user_id: currentUser.id,
    display_name: currentUser.user_metadata?.name || currentUser.email?.split("@")[0] || "Anonyme"
  });
  if (error) alert("Erreur envoi : " + error.message);
}

// ── Auth ──
sb.auth.onAuthStateChange((event, session) => {
  currentUser = session?.user || null;
  if (currentUser) {
    $("auth-screen").style.display = "none";
    $("app").style.display = "block";
    const name = currentUser.user_metadata?.name || currentUser.email?.split("@")[0] || "Moi";
    $("user-name").textContent = name;
    $("user-initials").textContent = initials(name);
    $("user-initials").style.background = avatarColor(name);
    buildChannels();
    loadMessages();
    subscribeRealtime();
  } else {
    $("auth-screen").style.display = "flex";
    $("app").style.display = "none";
  }
});

// ── Wire UI ──
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("tab-active"));
    btn.classList.add("tab-active");
    $("auth-error").textContent = "";
    $("name-group").style.display = btn.dataset.tab === "register" ? "flex" : "none";
    $("auth-submit").textContent = btn.dataset.tab === "register" ? "Créer mon compte" : "Se connecter";
  };
});

$("auth-submit").onclick = async () => {
  const mode = document.querySelector(".tab-active").dataset.tab;
  const email = $("auth-email").value.trim();
  const pass = $("auth-pass").value;
  const name = $("auth-name").value.trim();
  $("auth-error").textContent = "";
  $("auth-submit").textContent = "Chargement…";

  let result;
  if (mode === "register") {
    result = await sb.auth.signUp({ email, password: pass, options: { data: { name: name || email.split("@")[0] } } });
  } else {
    result = await sb.auth.signInWithPassword({ email, password: pass });
  }

  if (result.error) {
    const msgs = {
      "Invalid login credentials": "Email ou mot de passe incorrect.",
      "User already registered": "Cet email est déjà utilisé.",
      "Password should be at least 6 characters": "Mot de passe trop court (6 caractères min).",
      "Unable to validate email address: invalid format": "Format d'email invalide.",
    };
    $("auth-error").textContent = msgs[result.error.message] || result.error.message;
    $("auth-submit").textContent = mode === "register" ? "Créer mon compte" : "Se connecter";
  } else if (mode === "register" && !result.data.session) {
    $("auth-error").style.color = "#4ECDC4";
    $("auth-error").textContent = "✅ Vérifiez votre email pour confirmer votre compte !";
    $("auth-submit").textContent = "Créer mon compte";
  }
};

["auth-email","auth-pass","auth-name"].forEach(id => {
  $(id)?.addEventListener("keydown", e => { if (e.key === "Enter") $("auth-submit").click(); });
});

$("send-btn").onclick = sendMessage;
$("msg-input").addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
$("signout-btn").onclick = () => sb.auth.signOut();
$("menu-btn").onclick = () => $("sidebar").classList.toggle("sidebar-hidden");
</script>
</body>
</html>
